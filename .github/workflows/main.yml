name: Sync upstream repository

on:
  workflow_dispatch:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'  # every 10 minutes

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get latest upstream commit SHA
        id: upstream
        run: |
          SHA=$(git ls-remote https://github.com/jordibruin/forkrangerRecipes.git refs/heads/main | cut -f1)
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "::error::Failed to fetch upstream SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Read stored SHA
        id: stored
        run: |
          STORED=$(cat .last-sync-sha 2>/dev/null || true)
          # A previous bug wrote the literal string "null"; treat it as no stored SHA.
          if [ "$STORED" = "null" ]; then STORED=""; fi
          echo "sha=$STORED" >> "$GITHUB_OUTPUT"

      - name: Skip if unchanged
        if: steps.upstream.outputs.sha == steps.stored.outputs.sha
        run: |
          echo "No changes detected, exiting."

      - name: Sync upstream changes
        if: steps.upstream.outputs.sha != steps.stored.outputs.sha
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/jordibruin/forkrangerRecipes.git
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit --no-ff || true
          # Drop ANY .github/ changes from upstream — including new files like validate-json.yml.
          # Clear the path from the index entirely, then restore our version from HEAD,
          # and wipe any upstream-added files from the working tree.
          git rm -rf --cached --ignore-unmatch .github/ > /dev/null
          git checkout HEAD -- .github/
          git clean -fd .github/
          git commit -m "chore: sync from upstream" || echo "Nothing to commit"

      - name: Update stored SHA
        if: steps.upstream.outputs.sha != steps.stored.outputs.sha
        run: |
          echo "${{ steps.upstream.outputs.sha }}" > .last-sync-sha
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-sync-sha
          git commit -m "chore: update sync SHA" || echo "Nothing to commit"
          git push
