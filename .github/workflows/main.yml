name: Mirror legacy content repository

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # every hour, on the hour (UTC)

permissions:
  contents: write

concurrency:
  group: mirror-legacy-content
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout new content repository
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Mirror legacy content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/jordibruin/forkrangerRecipes.git
          git fetch --no-tags upstream refs/heads/main
          UPSTREAM_SHA=$(git rev-parse --verify 'FETCH_HEAD^{commit}')

          # Replace the entire tracked tree with upstream. Unlike a merge, this also
          # removes target-only files and repairs any existing content drift.
          git read-tree --reset -u FETCH_HEAD

          # These files belong to the new repository and are not mirrored upstream.
          git restore --source=HEAD --staged --worktree -- .github/ README.md
          printf '%s\n' "$UPSTREAM_SHA" > .last-sync-sha
          git add .last-sync-sha

          # Refuse to publish unless every non-exempt path matches upstream exactly.
          git diff --exit-code FETCH_HEAD -- . \
            ':(exclude).github/**' \
            ':(exclude).last-sync-sha' \
            ':(exclude)README.md'

          if git diff --cached --quiet; then
            echo "Content already mirrors upstream commit $UPSTREAM_SHA"
            exit 0
          fi

          git commit -m "chore: mirror legacy content"
          git push origin HEAD:main
